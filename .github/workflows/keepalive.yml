name: Supabase keep-alive

# Supabase free projects pause after 7 days idle. Ping the REST API every 2 days
# so the project never pauses. (Internal pg_cron activity does not reset the
# pause timer — an external request does.)
on:
  schedule:
    - cron: '17 6 */2 * *' # every 2 days at 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trivial authenticated request
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase responded $code"
          # 200 (or 401/403 from RLS) all prove the project is awake.
          if [ "$code" = "000" ]; then echo "No response"; exit 1; fi
